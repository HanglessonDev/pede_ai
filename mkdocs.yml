site_name: Pede AI
site_description: Chatbot de pedidos com IA para lanchonetes
site_author: Pede AI

repo_name: pede-ai
repo_url: https://github.com/pede-ai/pede-ai

theme:
  name: material
  language: pt
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/toggle-switch
        name: Modo escuro
    - scheme: slate
      primary: black
      toggle:
        icon: material/toggle-switch-off
        name: Modo claro

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source
            show_signature_annotations: true
            merge_init_into_class: true
            python_path: ["src", "scripts"]

nav:
  - Início: index.md
  - API:
    - Config: api/config.md
    - Extratores: api/extratores.md
    - Graph:
      - graph: api/graph.md
      - handlers: api/handlers.md
    - Observabilidade: api/observabilidade.md
    - Roteador: api/roteador.md
    - Scripts: api/scripts.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - admonition
  - pymdownx.details
