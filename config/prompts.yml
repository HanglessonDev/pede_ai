classificador_intencoes:
  intencoes_validas:
    - saudacao
    - pedir
    - remover
    - trocar
    - carrinho
    - duvida
    - confirmar
    - negar
    - cancelar
  prompt: |
    Classifique a intenção do usuário em UMA palavra.
    Responda APENAS o NOME DA INTENÇÃO exatamente como listado abaixo.

    INTENÇÕES VÁLIDAS (use APENAS estes nomes):
    - saudacao: cumprimentos (oi, olá, bom dia, boa noite, e aí)
    - pedir: quer adicionar itens (quero, me vê, manda um, quero um)
    - remover: quer tirar itens (tira, sem, remove, tira, não quero)
    - trocar: quer mudar itens (troca, muda, troca por, prefiro)
    - carrinho: quer ver o pedido (mostra, carrinho, total, quanto, meu pedido)
    - duvida: perguntas sobre o serviço (entregam, horário, preço, demora)
    - confirmar: concorda, confirma, diz sim, quer prosseguir (ok, sim, pode, confirmar, fechar, isso, pode ser, com certeza)
    - negar: discorda, diz não, recusa (não, nao, não quero, de jeito nenhum)
    - cancelar: quer cancelar tudo (cancela, esquece, desiste, anula, volta atrás)

    IMPORTANTE: Responda "pedir" (não "pedido"), "confirmar" (não "confirmou").

    REGRAS DE DECISÃO:
    - "confirmar", "pedido", "fechar", "ok", "isso" → confirmar
    - "cancelar", "desistir", "anular", "esquecer" → cancelar
    - ATENÇÃO: "perdido" é erro de digitação para "pedido" → confirmar (NÃO cancelar)
    - ATENÇÃO: "perdir" é erro de digitação para "pedir" → pedir

    CRITÉRIOS DE CLASSIFICAÇÃO (leia na ordem):
    1. VERBOS DE AÇÃO têm prioridade sobre substantivos:
       - "quero", "me vê", "manda", "pede" → SEMPRE pedir (mesmo que mencione itens)
       - "tira", "sem", "remove" → SEMPRE remover
       - "troca", "muda", "prefiro" → SEMPRE trocar
       - "mostra", "veja", "ver", "olhar" + "pedido/carrinho" → SEMPRE carrinho
    2. ATENÇÃO: "pedido" como SUBSTANTIVO ≠ verbo "pedir":
       - "meu pedido", "mostra o pedido", "ver meu pedido" → carrinho (NÃO pedir)
       - "quero pedir", "vou pedir" → pedir
    3. Se NÃO houver verbo de ação, use o contexto geral
    4. Frases como "quero um X" ou "me vê um X" são SEMPRE "pedir"
       - Ex: "quero um x-salada" → pedir (NÃO trocar, mesmo que "xsalada" apareça em outros contextos)
       - Ex: "quero um x tudo" → pedir
       - Ex: "me vê um x-bacon" → pedir

    PRIORIDADE (apenas se NÃO houver verbo de ação claro):
    cancelar > remover > trocar > pedir > carrinho > duvida > confirmar > negar > saudacao

    EXEMPLOS:
    "bom dia, quero um xtudo" → pedir (verbo "quero" domina)
    "quero um x-salada" → pedir (verbo "quero" domina)
    "quero um x tudo" → pedir (verbo "quero" domina)
    "me vê um xsalada" → pedir (verbo "me vê" domina)
    "oi, cancela tudo" → cancelar
    "sim" → confirmar
    "pode ser" → confirmar
    "muda pra xsalada" → trocar (verbo "muda" sem "quero")
    "troca coca por suco" → trocar (verbo "troca")
    "tira a coca" → remover

    SUA VEZ:
    "{mensagem}" →